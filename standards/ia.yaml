# Product family map — the ONE thing the pipeline can't infer from prose.
#
# OpenAPI endpoints carry tags, but tags don't say which product family a
# developer thinks they belong to, which product tab they document, or which
# API Reference group they live under. This file supplies exactly that mapping
# and nothing else.
#
# Everything evaluative — what each tab must contain, the no-narrative-in-
# reference rule, Diataxis rules, title conventions — lives in prose:
#   .claude/agents/docs-ia.md      (structure + requirements)
#   .claude/agents/diataxis.md     (content-type rules)
#   .claude/agents/docs-writer.md  (writing rules)
# The live structure of the site (which page is in which tab) lives in docs.json.
#
# Keep this map current: when the pipeline finds an OpenAPI tag not listed here,
# it flags it for a human to place. Don't add rules here — add them to docs-ia.md.

families:
  Translate:
    tags: [TranslateText, TranslateDocuments]
    product_tab: Translate            # tab name in docs.json
    api_reference_group: Translate    # group name under the API Reference tab

  Customize:
    tags: [ManageGlossaries, ManageMultilingualGlossaries, TranslationMemories]
    product_tab: Customize
    api_reference_group: Customize
    # Style rules live under Customize but have no OpenAPI tag yet.

  Write:
    tags: [RephraseText, CorrectText]
    product_tab: Write
    api_reference_group: Write

  Voice:
    tags: [VoiceAPI, VoiceTranslateJob]
    product_tab: Voice
    api_reference_group: Voice

  Admin:
    tags: [AdminApi]
    product_tab: Admin
    api_reference_group: Admin

  Languages:
    tags: [MetaInformation]
    product_tab: null                 # no standalone product tab; lives in Home
    api_reference_group: Languages

  # QualityEvaluation has no family yet — the pipeline will flag it for a human
  # to decide where it belongs.
